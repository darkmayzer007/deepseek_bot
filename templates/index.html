<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI — Веб-чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* ========== ЦЕНТРАЛЬНАЯ НАДПИСЬ ========== */
        .center-love-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            pointer-events: none;
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            color: #ff1744;
            text-shadow: 0 0 20px rgba(255, 23, 68, 0.8), 0 0 60px rgba(255, 23, 68, 0.4);
            animation: centerTextGlow 3s ease-in-out infinite;
            line-height: 1.3;
            letter-spacing: 2px;
            user-select: none;
            white-space: nowrap;
            transition: opacity 0.8s ease, transform 0.8s ease;
            will-change: opacity, transform;
        }
        .center-love-text.faded {
            opacity: 0.15;
            transform: translate(-50%, -50%) scale(0.8);
        }
        .center-love-text.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            pointer-events: none;
        }
        .center-love-text .line1 {
            display: block;
        }
        .center-love-text .line2 {
            display: block;
            font-size: 28px;
        }
        @keyframes centerTextGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 23, 68, 0.8), 0 0 60px rgba(255, 23, 68, 0.4); }
            50% { text-shadow: 0 0 30px rgba(255, 23, 68, 1), 0 0 80px rgba(255, 23, 68, 0.5); }
        }

        /* ========== ОРБИТАЛЬНЫЕ СЕРДЕЧКИ (CSS) ========== */
        .orbit-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            z-index: 49;
            pointer-events: none;
        }
        .orbit-ring .h {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 18px;
            animation: orbitSpin 4s linear infinite;
            will-change: transform;
            opacity: 0.8;
        }
        @keyframes orbitSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateX(150px) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateX(150px) rotate(-360deg); }
        }

        /* ========== ЛЕВОЕ СЕРДЦЕ ========== */
        .left-heart {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }
        .left-heart .heart-icon {
            font-size: 70px;
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.6));
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            will-change: transform;
        }
        .left-heart .heart-icon:active {
            transform: scale(0.85);
        }
        .left-heart .click-hint {
            font-size: 11px;
            color: rgba(255, 75, 75, 0.8);
            text-align: center;
            animation: pulseHint 1.5s ease-in-out infinite;
            background: rgba(255, 0, 0, 0.1);
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 75, 75, 0.2);
            white-space: nowrap;
        }
        @keyframes pulseHint {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        /* ========== ЧАСТИЦЫ (CSS-анимация) ========== */
        .particle {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            user-select: none;
            animation: particleFly 3s ease-out forwards;
            will-change: transform, opacity;
        }
        @keyframes particleFly {
            0% { opacity: 0; transform: scale(0.3) translate(0, 0); }
            10% { opacity: 0.9; }
            80% { opacity: 0.8; }
            100% { opacity: 0; transform: scale(1) translate(var(--fx), var(--fy)); }
        }

        /* ========== ЧАТ ========== */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }
        .chat-header {
            padding: 16px 24px;
            background: rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chat-header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .chat-header h1 span { color: #6c63ff; }
        .model-selector { display: flex; align-items: center; gap: 8px; }
        .model-selector label { font-size: 13px; color: rgba(255,255,255,0.6); }
        .model-selector select {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #e0e0e0; padding: 6px 12px; border-radius: 8px; font-size: 13px;
            cursor: pointer; outline: none;
        }
        .model-selector select:focus { border-color: #6c63ff; }
        .model-selector select option { background: #302b63; color: #e0e0e0; }
        .header-buttons { display: flex; gap: 8px; }
        .btn-clear {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #e0e0e0; padding: 6px 14px; border-radius: 8px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-clear:hover { background: rgba(255,80,80,0.2); border-color: #ff5050; color: #ff5050; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .message { display: flex; gap: 12px; max-width: 90%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .message.user .avatar { background: #6c63ff; }
        .message.assistant .avatar { background: #00c853; }
        .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
        .message.user .bubble { background: #6c63ff; color: white; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .typing-indicator { display: none; align-self: flex-start; padding: 12px 16px; margin: 0 24px; background: rgba(255,255,255,0.1); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; gap: 4px; }
        .typing-indicator.active { display: flex; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: #6c63ff; animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
        .chat-input { padding: 16px 24px; background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        .chat-input textarea {
            flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; padding: 12px 16px; color: #e0e0e0; font-size: 14px;
            font-family: inherit; resize: none; outline: none;
            min-height: 48px; max-height: 120px; transition: border-color 0.2s;
        }
        .chat-input textarea:focus { border-color: #6c63ff; }
        .chat-input textarea::placeholder { color: rgba(255,255,255,0.4); }
        .btn-send { background: #6c63ff; border: none; color: white; width: 48px; height: 48px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .btn-send:hover { background: #5a52e0; transform: scale(1.05); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-send svg { width: 20px; height: 20px; }
        @media (max-width: 600px) {
            .chat-container { height: 100vh; border-radius: 0; max-width: 100%; }
            .chat-messages { padding: 16px; }
            .message { max-width: 95%; }
        }
        @media (max-width: 900px) {
            .left-heart { display: none; }
        }
    </style>
</head>
<body>

    <!-- ========== ЦЕНТРАЛЬНАЯ НАДПИСЬ ========== -->
    <div class="center-love-text" id="centerLoveText">
        <span class="line1">I LOVE MY ZAIKA</span>
        <span class="line2">ALEXANDRA ❤️</span>
    </div>

    <!-- ========== ОРБИТАЛЬНЫЕ СЕРДЕЧКИ ========== -->
    <div class="orbit-ring" id="orbitRing">
        <span class="h" style="animation-delay:0s">❤️</span>
        <span class="h" style="animation-delay:0.5s">💖</span>
        <span class="h" style="animation-delay:1s">💗</span>
        <span class="h" style="animation-delay:1.5s">💝</span>
        <span class="h" style="animation-delay:2s">💕</span>
        <span class="h" style="animation-delay:2.5s">♥️</span>
        <span class="h" style="animation-delay:3s">💓</span>
        <span class="h" style="animation-delay:3.5s">💘</span>
    </div>

    <!-- ========== ЛЕВОЕ СЕРДЦЕ ========== -->
    <div class="left-heart">
        <div class="heart-icon" id="heartBtn">❤️</div>
        <div class="click-hint">👆 кликай меня</div>
    </div>

    <!-- Контейнер для частиц -->
    <div id="particleContainer"></div>

    <!-- ========== ЧАТ ========== -->
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 <span>DeepSeek</span> AI</h1>
            <div class="model-selector">
                <label>Модель:</label>
                <select id="modelSelect">
                    <option value="deepseek-chat">DeepSeek V2.5 (базовая)</option>
                    <option value="deepseek-v4-pro" selected>🔥 DeepSeek V4 Pro</option>
                    <option value="deepseek-v4-flash">⚡ DeepSeek V4 Flash</option>
                </select>
            </div>
            <div class="header-buttons">
                <button class="btn-clear" onclick="clearHistory()">🧹 Очистить</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">Привет! Я DeepSeek AI (выбрана DeepSeek V4 Pro). Задавай любые вопросы — отвечу без ограничений! 🚀</div>
            </div>
        </div>
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
        <div class="chat-input">
            <textarea id="messageInput" placeholder="Напиши сообщение... (можно вставлять текст Ctrl+V)" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
                onpaste="setTimeout(() => this.style.height='auto', 0)"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let sessionId = 'session_' + Date.now();
        let isLoading = false;
        let clickCount = 0;
        let chatStarted = false;

        const messagesDiv = document.getElementById('chatMessages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const modelSelect = document.getElementById('modelSelect');
        const centerText = document.getElementById('centerLoveText');

        // ========== ФРАЗЫ ==========
        const lovePhrases = [
            'Я тебя очень сильно люблю ❤️', 'Я скучаю по тебе 💕',
            'Ты моя конфетка 🍬', 'Ты моя сладость 🍫',
            'Ты моя нежная 🌸', 'Ты моя кошечка 😺',
            'Ты моя любовь 💖', 'Все будет супер отлично ✨',
            'Все будет хорошо 🌈', 'Ты моя милашка 🥰',
        ];
        const heartEmojis = ['❤️', '💖', '💗', '💝', '💕', '♥️', '💓', '💘'];

        // ========== ЗАТУХАНИЕ НАДПИСИ ==========
        function fadeCenterText() {
            if (!chatStarted) {
                chatStarted = true;
                centerText.classList.add('faded');
                // Полностью убираем через 3 секунды после первого сообщения
                setTimeout(() => centerText.classList.add('hidden'), 3000);
            }
        }

        // ========== ДОЖДЬ ИЗ ЧАСТИЦ (CSS-анимация, без лагов) ==========
        function spawnHeartShower() {
            clickCount++;
            const count = Math.min(12 + clickCount, 50);
            const container = document.getElementById('particleContainer');

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'particle';

                // 60% сердечко, 40% фраза
                if (Math.random() < 0.4) {
                    el.textContent = lovePhrases[Math.floor(Math.random() * lovePhrases.length)];
                    el.style.color = ['#ff1744','#ff4081','#e040fb','#ff6f00','#ff5252'][Math.floor(Math.random() * 5)];
                    el.style.fontSize = (14 + Math.random() * 10) + 'px';
                    el.style.background = 'rgba(255,255,255,0.06)';
                    el.style.padding = '4px 12px';
                    el.style.borderRadius = '20px';
                    el.style.border = '1px solid rgba(255,255,255,0.1)';
                } else {
                    el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                    el.style.fontSize = (20 + Math.random() * 24) + 'px';
                }

                const fx = (-60 + Math.random() * 120) + 'px';
                const fy = (-80 + Math.random() * 20) + 'px';
                el.style.setProperty('--fx', fx);
                el.style.setProperty('--fy', fy);
                el.style.left = (5 + Math.random() * 85) + '%';
                el.style.top = (5 + Math.random() * 80) + '%';
                el.style.animationDuration = (2 + Math.random() * 2) + 's';
                el.style.animationDelay = (Math.random() * 0.5) + 's';

                container.appendChild(el);
                el.addEventListener('animationend', () => el.remove());
            }
        }

        document.getElementById('heartBtn').addEventListener('click', spawnHeartShower);

        // ========== ФУНКЦИИ ЧАТА ==========
        function scrollToBottom() {
            setTimeout(() => messagesDiv.scrollTop = messagesDiv.scrollHeight, 50);
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${content}</div>`;
            messagesDiv.appendChild(div);
            scrollToBottom();
            return div;
        }

        function getLastBubble() {
            return messagesDiv.querySelector('.message.assistant:last-child .bubble');
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || isLoading) return;

            // Первое сообщение — затухание надписи
            fadeCenterText();

            inputEl.value = '';
            inputEl.style.height = 'auto';
            isLoading = true;
            sendBtn.disabled = true;

            addMessage('user', text);
            typingIndicator.classList.add('active');
            addMessage('assistant', '');

            const selectedModel = modelSelect.value;

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text,
                        model: selectedModel
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            if (data.startsWith('[ERROR]')) {
                                fullText += '\n\n❌ ' + data.slice(7);
                                continue;
                            }
                            fullText += data;
                        }
                    }

                    const bubble = getLastBubble();
                    if (bubble) {
                        bubble.textContent = fullText;
                        scrollToBottom();
                    }
                }

            } catch (err) {
                const bubble = getLastBubble();
                if (bubble) bubble.textContent = '❌ Ошибка соединения: ' + err.message;
            } finally {
                typingIndicator.classList.remove('active');
                isLoading = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        async function clearHistory() {
            await fetch('/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            });
            messagesDiv.innerHTML = `
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">История очищена! Начинаем с чистого листа. 🧹</div>
                </div>
            `;
            // Возвращаем надпись
            chatStarted = false;
            centerText.classList.remove('faded', 'hidden');
        }

        inputEl.focus();
    </script>
</body>
</html>
